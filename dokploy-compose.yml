# =============================================================================
# Aktivar — Dokploy / CubePath Deployment
# Single-file compose for one-click deploy via Dokploy
#
# HOW TO DEPLOY ON DOKPLOY:
# 1. In Dokploy → Create Project → Docker Compose
# 2. Paste this repo URL or upload this file
# 3. Set environment variables (see below)
# 4. Go to Domains tab → click dice icon 🎲 → generates free traefik.me subdomain
# 5. Set Container Port: 80, Service: nginx, HTTPS: off
# 6. Deploy!
#
# REQUIRED ENV VARS (set in Dokploy → Environment):
#   SECRET_KEY=<random-string-50-chars>
#   POSTGRES_PASSWORD=<strong-password>
#
# OPTIONAL ENV VARS:
#   STRIPE_SECRET_KEY, RESEND_API_KEY, TWILIO_*, SENTRY_DSN, etc.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + PostGIS (database — runs inside Docker)
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aktivar}
      POSTGRES_USER: ${POSTGRES_USER:-aktivar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Dokploy env vars}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aktivar}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis 7 (cache + Celery broker + WebSocket channels)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Django Backend (Daphne ASGI — handles HTTP + WebSocket)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgis://${POSTGRES_USER:-aktivar}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aktivar}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in Dokploy env vars}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      DJANGO_SETTINGS_MODULE: aktivar.settings
      SECURE_SSL_REDIRECT: "False"
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      # Optional services
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      ONESIGNAL_APP_ID: ${ONESIGNAL_APP_ID:-}
      ONESIGNAL_REST_API_KEY: ${ONESIGNAL_REST_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        echo '=== Running migrations ===' &&
        python manage.py migrate --noinput &&
        echo '=== Collecting static files ===' &&
        python manage.py collectstatic --noinput &&
        echo '=== Seeding demo data ===' &&
        (python manage.py seed_demo --skip-if-exists 2>&1 || echo 'Seed skipped or failed (non-fatal)') &&
        echo '=== Starting Daphne on port 8000 ===' &&
        daphne -b 0.0.0.0 -p 8000 --access-log - aktivar.asgi:application
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Celery Worker (async tasks: emails, notifications, etc.)
  # ---------------------------------------------------------------------------
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgis://${POSTGRES_USER:-aktivar}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aktivar}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      DJANGO_SETTINGS_MODULE: aktivar.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A aktivar worker --loglevel=info --concurrency=2

  # ---------------------------------------------------------------------------
  # React Frontend (Vite build → served by internal Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_STRIPE_PUBLIC_KEY: ${VITE_STRIPE_PUBLIC_KEY:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    restart: always

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # Dokploy's Traefik routes traffic here via the dokploy-network.
  # Dokploy injects labels automatically when you assign a domain.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: always
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - default
      - dokploy-network

# =============================================================================
# Networks
# =============================================================================
networks:
  default:
    driver: bridge
  dokploy-network:
    external: true

# =============================================================================
# Persistent volumes (data survives container restarts)
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
