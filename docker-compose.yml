# =============================================================================
# Aktivar Docker Compose - Production Stack
# Services: PostgreSQL/PostGIS, Redis, Django Backend, Celery, React Frontend, Nginx
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 with PostGIS extension for geospatial data
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aktivar}
      POSTGRES_USER: ${POSTGRES_USER:-aktivar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aktivar} -d ${POSTGRES_DB:-aktivar}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis 7 for caching, Celery broker, and Channels layer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Django Backend (Daphne ASGI server)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgis://${POSTGRES_USER:-aktivar}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aktivar}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 --access-log - aktivar.asgi:application"

  # ---------------------------------------------------------------------------
  # Celery Worker for async task processing
  # ---------------------------------------------------------------------------
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgis://${POSTGRES_USER:-aktivar}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aktivar}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A aktivar worker --loglevel=info --concurrency=2

  # ---------------------------------------------------------------------------
  # React Frontend (built with Vite, served by internal Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "${FRONTEND_PORT:-3000}:80"

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # Routes traffic to frontend and backend services
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    depends_on:
      - backend
      - frontend

# =============================================================================
# Persistent volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local
